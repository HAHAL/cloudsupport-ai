services:
  cloudsupport-ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: mirrors.aliyun.com
        PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
        PIP_TRUSTED_HOST: mirrors.aliyun.com
    container_name: cloudsupport-ai
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      KNOWLEDGE_DIR: /app/knowledge
      CHROMA_DIR: /app/chroma_data
      CHROMA_COLLECTION: cloudsupport_kb
      RAG_TOP_K: 4
      CHUNK_SIZE: 800
      CHUNK_OVERLAP: 120
      FEEDBACK_FILE: /app/data/answer_feedback.jsonl
    volumes:
      - ./knowledge:/app/knowledge
      - ./chroma_data:/app/chroma_data
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
