<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CloudSupport AI Console</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", Arial, sans-serif;
        background: #f5f7fb;
        color: #1f2937;
      }

      .layout {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        min-height: 100vh;
      }

      aside {
        background: #111827;
        color: #f9fafb;
        padding: 24px 18px;
      }

      aside h1 {
        margin: 0;
        font-size: 22px;
      }

      aside p {
        color: #cbd5e1;
        line-height: 1.6;
        margin: 10px 0 22px;
        font-size: 13px;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        padding: 11px 12px;
        text-align: left;
        color: #e5e7eb;
        background: transparent;
        cursor: pointer;
        font: inherit;
      }

      .nav button.active,
      .nav button:hover {
        background: #2563eb;
        color: #ffffff;
      }

      main {
        padding: 28px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }

      .topbar h2 {
        margin: 0;
        font-size: 22px;
      }

      .topbar a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(320px, 480px) minmax(0, 1fr);
        gap: 18px;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 18px;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 13px;
        font-weight: 700;
        color: #374151;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 10px 11px;
        font: inherit;
        background: #ffffff;
      }

      textarea {
        min-height: 118px;
        resize: vertical;
        line-height: 1.55;
      }

      .primary {
        margin-top: 14px;
        width: 100%;
        border: 0;
        border-radius: 6px;
        padding: 11px 14px;
        background: #2563eb;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .primary:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      pre {
        margin: 0;
        min-height: 420px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.55;
        color: #111827;
      }

      .feedback {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      .feedback button {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 8px 10px;
        background: #ffffff;
        cursor: pointer;
      }

      .hint {
        color: #64748b;
        font-size: 13px;
        line-height: 1.6;
        margin-top: 10px;
      }

      @media (max-width: 900px) {
        .layout,
        .workspace {
          grid-template-columns: 1fr;
        }

        aside {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <h1>CloudSupport AI</h1>
        <p>企业知识库 AI 技术支持助手，用于工单分诊、知识库问答、API 报错分析、日志分析、客户回复和升级信息收集。</p>
        <div class="nav" id="nav"></div>
      </aside>

      <main>
        <div class="topbar">
          <h2 id="workflowTitle">知识库问答</h2>
          <a href="/docs" target="_blank" rel="noreferrer">Swagger /docs</a>
        </div>

        <section class="workspace">
          <form class="panel" id="workflowForm">
            <div id="fields"></div>
            <button class="primary" id="submitButton" type="submit">执行分析</button>
            <p class="hint">默认使用规则兜底逻辑，未配置外部模型 Key 也可以完成主要流程演示。</p>
          </form>

          <section class="panel">
            <pre id="result">请选择左侧工作流并提交请求。</pre>
            <div class="feedback">
              <button type="button" data-rating="useful">标记 useful</button>
              <button type="button" data-rating="not_useful">标记 not_useful</button>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script>
      const workflows = {
        chat: {
          label: "知识库问答",
          endpoint: "/chat",
          fields: [
            {
              name: "question",
              label: "技术支持问题",
              type: "textarea",
              value: "LLM API 返回 429 Too Many Requests，应该如何排查？",
            },
          ],
        },
        triage: {
          label: "工单分诊",
          endpoint: "/ticket-triage",
          fields: [
            { name: "title", label: "工单标题", value: "Enterprise customer reports LLM API timeout" },
            {
              name: "description",
              label: "工单描述",
              type: "textarea",
              value:
                "The customer reports intermittent timeout when calling chat/completions. The issue affects production workflow in Singapore region.",
            },
            { name: "customer_level", label: "客户等级", value: "enterprise" },
            { name: "affected_product", label: "受影响产品", value: "LLM API" },
          ],
        },
        apiDebug: {
          label: "API 报错分析",
          endpoint: "/api-debug",
          fields: [
            { name: "method", label: "HTTP 方法", value: "POST" },
            { name: "url", label: "请求 URL", value: "https://api.example.com/v1/chat/completions" },
            { name: "status_code", label: "状态码", value: "429", number: true },
            { name: "request_id", label: "Request ID", value: "req_sample_20260505_001" },
            {
              name: "error_message",
              label: "错误信息",
              type: "textarea",
              value: "Too Many Requests: rate limit exceeded for current workspace.",
            },
          ],
        },
        logAnalyze: {
          label: "日志分析",
          endpoint: "/log-analyze",
          fields: [
            {
              name: "log_text",
              label: "日志内容",
              type: "textarea",
              value:
                '2026-05-05T10:15:20+08:00 status=504 request_time=60.001 upstream_response_time=60.000 request_id=req_sample_001 error="upstream timed out"',
            },
            { name: "question", label: "分析重点", value: "Why did this API request return 504?" },
          ],
        },
        reply: {
          label: "客户回复生成",
          endpoint: "/ticket-reply",
          fields: [
            { name: "ticket_title", label: "工单标题", value: "LLM API timeout during peak traffic" },
            {
              name: "ticket_description",
              label: "工单描述",
              type: "textarea",
              value:
                "Customer reports timeout when calling the model endpoint. Current evidence shows long request duration but no complete request body yet.",
            },
            { name: "analysis_context", label: "分析上下文", value: "Possible timeout or request-size issue. Need request ID, timestamp, model name, and retry behavior." },
            { name: "customer_name", label: "客户称呼", value: "Customer" },
          ],
        },
        escalation: {
          label: "升级信息收集",
          endpoint: "/escalation-info",
          fields: [
            { name: "issue_summary", label: "问题摘要", value: "LLM API returns persistent 504 for production requests" },
            { name: "product_area", label: "产品区域", value: "LLM" },
            { name: "observed_error", label: "观察到的错误", value: "504 Gateway Timeout, request_id=req_sample_002" },
            { name: "business_impact", label: "业务影响", value: "Production workflow is delayed for multiple enterprise users." },
          ],
        },
      };

      let currentWorkflow = "chat";
      let lastResult = null;

      const nav = document.getElementById("nav");
      const title = document.getElementById("workflowTitle");
      const fields = document.getElementById("fields");
      const form = document.getElementById("workflowForm");
      const result = document.getElementById("result");
      const submitButton = document.getElementById("submitButton");

      function renderNav() {
        nav.innerHTML = "";
        for (const [key, workflow] of Object.entries(workflows)) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = workflow.label;
          button.className = key === currentWorkflow ? "active" : "";
          button.addEventListener("click", () => {
            currentWorkflow = key;
            renderNav();
            renderFields();
          });
          nav.appendChild(button);
        }
      }

      function renderFields() {
        const workflow = workflows[currentWorkflow];
        title.textContent = workflow.label;
        fields.innerHTML = "";
        workflow.fields.forEach((field) => {
          const label = document.createElement("label");
          label.textContent = field.label;
          label.htmlFor = field.name;
          fields.appendChild(label);

          const input = document.createElement(field.type === "textarea" ? "textarea" : "input");
          input.id = field.name;
          input.name = field.name;
          input.value = field.value || "";
          if (field.number) input.type = "number";
          fields.appendChild(input);
        });
      }

      function collectPayload() {
        const payload = {};
        workflows[currentWorkflow].fields.forEach((field) => {
          const value = document.getElementById(field.name).value.trim();
          if (!value) return;
          payload[field.name] = field.number ? Number(value) : value;
        });
        return payload;
      }

      async function postJson(endpoint, payload) {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          throw new Error(await response.text());
        }
        return response.json();
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        submitButton.textContent = "处理中";
        result.textContent = "正在分析...";
        try {
          const workflow = workflows[currentWorkflow];
          const payload = collectPayload();
          lastResult = await postJson(workflow.endpoint, payload);
          result.textContent = JSON.stringify(lastResult, null, 2);
        } catch (error) {
          result.textContent = `请求失败：${error.message}`;
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "执行分析";
        }
      });

      document.querySelectorAll(".feedback button").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!lastResult) {
            result.textContent = "请先执行一次分析，再提交反馈。";
            return;
          }
          const payload = {
            workflow: workflows[currentWorkflow].endpoint.replace("/", ""),
            rating: button.dataset.rating,
            question: JSON.stringify(collectPayload()),
            answer: JSON.stringify(lastResult),
            source: "web-console",
          };
          try {
            const feedback = await postJson("/feedback", payload);
            result.textContent = `${JSON.stringify(lastResult, null, 2)}\n\n反馈已保存：${feedback.feedback_file}`;
          } catch (error) {
            result.textContent = `反馈提交失败：${error.message}`;
          }
        });
      });

      renderNav();
      renderFields();
    </script>
  </body>
</html>
