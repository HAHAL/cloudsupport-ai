name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ ! -f .env ]; then cp .env.example .env; fi
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python -m compileall .

      - name: Run tests
        run: |
          pytest -q

      - name: Start application
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
          echo $! > app.pid

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo "Health check passed."
              exit 0
            fi
            echo "Health check failed, retrying in 3 seconds... ($i/30)"
            sleep 3
          done

          echo "Health check failed after retries. Showing app.log:"
          cat app.log
          exit 1

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APT_MIRROR=deb.debian.org \
            --build-arg PIP_INDEX_URL=https://pypi.org/simple \
            --build-arg PIP_TRUSTED_HOST=pypi.org \
            -t cloudsupport-ai:ci .
